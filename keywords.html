const $=id=>document.getElementById(id), SVGNS="http://www.w3.org/2000/svg";
const YEARS=PAYLOAD.years, NY=YEARS.length;
let broad="ALL", mode="new", sortBy="total", hotKw=null;

function init(){
  const sb=$("broad");
  PAYLOAD.broads.forEach(b=>{const o=document.createElement("option");o.value=b;
    o.textContent="대계열: "+(b==="ALL"?"전체":b); sb.appendChild(o);});
  sb.onchange=()=>{broad=sb.value; draw();};
  $("mode").querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
    mode=btn.dataset.m; setseg("mode",btn); draw();});
  $("sort").querySelectorAll("button").forEach(btn=>btn.onclick=()=>{
    sortBy=btn.dataset.s; setseg("sort",btn); draw();});
  draw();
}
function setseg(id,btn){$(id).querySelectorAll("button").forEach(b=>b.classList.remove("on"));btn.classList.add("on");}

function curData(){ return PAYLOAD.data[broad][mode] || {}; }
function total(a){return a.reduce((x,y)=>x+y,0);}
function early(a){return (a[0]+a[1]+a[2])/3;}
function late(a){return (a[NY-1]+a[NY-2]+a[NY-3])/3;}
function trendColor(a){const d=late(a)-early(a); if(d>0.6)return "var(--up)"; if(d<-0.6)return "var(--down)"; return "var(--flat)";}

function draw(){
  const d=curData();
  let entries=Object.entries(d);
  if(sortBy==="total") entries.sort((a,b)=>total(b[1])-total(a[1]));
  else entries.sort((a,b)=>(late(b[1])-early(b[1]))-(late(a[1])-early(a[1])));
  entries=entries.slice(0,42);
  const maxc=Math.max(1,...entries.flatMap(e=>e[1]));
  const R=v=> v<=0?0:Math.max(2.2, 16*Math.sqrt(v/maxc));

  const ROWH=26, X0=140, COLW=Math.max(46,Math.min(70,(window.innerWidth-260-X0-40)/NY)), TOP=34;
  const W=X0+NY*COLW+20, H=TOP+entries.length*ROWH+10;
  const svg=$("svg"); svg.innerHTML=""; svg.setAttribute("width",W); svg.setAttribute("height",H);
  // year headers + gridlines
  YEARS.forEach((y,i)=>{const x=X0+i*COLW+COLW/2;
    const t=el("text",{class:"yearlbl",x,y:20}); t.textContent=("'"+String(y).slice(2)); svg.appendChild(t);
    svg.appendChild(el("line",{class:"gridline",x1:x,y1:TOP-6,x2:x,y2:H-6}));});
  entries.forEach(([kw,arr],ri)=>{
    const y=TOP+ri*ROWH+ROWH/2;
    const lab=el("text",{class:"ylabel"+(kw===hotKw?" hot":""),x:X0-10,y,"text-anchor":"end","dominant-baseline":"middle"});
    lab.textContent=kw; svg.appendChild(lab);
    YEARS.forEach((yr,i)=>{const v=arr[i]; if(!v)return; const cx=X0+i*COLW+COLW/2;
      const c=el("circle",{cx,cy:y,r:R(v),fill:trendColor(arr),"fill-opacity":0.82});
      c.addEventListener("mouseenter",e=>tip(e,kw,yr,v,arr));
      c.addEventListener("mousemove",mv); c.addEventListener("mouseleave",()=>$("tip").style.display="none");
      svg.appendChild(c);});
  });
  buildSide();
}
function buildSide(){
  const d=curData(); const arr=Object.entries(d).map(([kw,a])=>[kw,late(a)-early(a),a]);
  const up=arr.filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,16);
  const dn=arr.filter(x=>x[1]<0).sort((a,b)=>a[1]-b[1]).slice(0,12);
  const row=(kw,delta)=>{const div=document.createElement("div");div.className="rk";
    div.innerHTML=`<span class="kw">${kw}</span><span class="delta ${delta>=0?'up':'down'}">${delta>=0?'+':''}${delta.toFixed(1)}</span>`;
    div.onmouseenter=()=>{hotKw=kw; draw();}; div.onmouseleave=()=>{hotKw=null; draw();}; return div;};
  const ru=$("rising"); ru.innerHTML=""; up.forEach(x=>ru.appendChild(row(x[0],x[1])));
  const rd=$("falling"); rd.innerHTML=""; dn.forEach(x=>rd.appendChild(row(x[0],x[1])));
}
function tip(e,kw,yr,v,arr){const t=$("tip");
  const ex=(PAYLOAD.examples[kw]||[]).slice(0,6).join(" · ");
  t.innerHTML=`<div class="d">${kw} <span class="m">· ${yr}년 ${v}건</span></div>`+
    `<div class="m">총 ${total(arr)}건 · 초기 ${early(arr).toFixed(1)} → 최근 ${late(arr).toFixed(1)}</div>`+
    (ex?`<div class="ex">예: ${ex}</div>`:"");
  t.style.display="block"; mv(e);}
function mv(e){const t=$("tip");let x=e.clientX+14;if(x+320>innerWidth)x=e.clientX-320;t.style.left=x+"px";t.style.top=(e.clientY+14)+"px";}
function el(tag,attr){const e=document.createElementNS(SVGNS,tag);for(const k in attr)e.setAttribute(k,attr[k]);return e;}
window.addEventListener("resize",()=>draw());
init();
</script>
